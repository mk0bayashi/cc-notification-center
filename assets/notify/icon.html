<!doctype html>
<html><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:512px;height:512px;overflow:hidden;background:transparent;}
  .wrap{ width:512px; height:512px; display:flex; align-items:center; justify-content:center; }
  .icon{
    width:440px; height:440px; border-radius:104px;   /* squircle 風 */
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 18px 40px rgba(0,0,0,0.30), inset 0 2px 6px rgba(255,255,255,0.25);
    font-family:-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  }
  .glyph{ color:#fff; font-weight:800; line-height:1;
    text-shadow:0 4px 12px rgba(0,0,0,0.22); }
</style></head>
<body>
  <div class="wrap"><div class="icon" id="icon"><span class="glyph" id="glyph"></span></div></div>
<script>
  const M = {
    needs_permission:{ c1:'#FFB340', c2:'#F08000', glyph:'!',  size:300 },
    needs_input:     { c1:'#D08BF6', c2:'#A33FE0', glyph:'?',  size:280 },
    waiting:         { c1:'#5CE08A', c2:'#23B24E', glyph:'✓', size:300 },
  };
  const s = new URLSearchParams(location.search).get('state') || 'waiting';
  const m = M[s] || M.waiting;
  const ic = document.getElementById('icon'), g = document.getElementById('glyph');
  ic.style.background = 'linear-gradient(145deg,'+m.c1+' 0%,'+m.c2+' 100%)';
  g.textContent = m.glyph;
  g.style.fontSize = m.size+'px';
</script>
</body></html>
